# Simple Keystone Gateway Configuration - Basic Lua Test
# Minimal configuration for testing Lua route functionality

server:
  addr: ":8080"
  read_header_timeout: "5s"
  idle_timeout: "120s"

  admin:
    # Enable/disable admin endpoints entirely
    enabled: true

    # Option 1: Localhost-only access (recommended for development)
    # Restricts admin endpoints to 127.0.0.1 and ::1 only
    localhost_only: false
    allowed_ips:
       - "192.168.1.100"        # Operations team workstation
    #   - "10.0.0.0/8"           # Internal corporate network
    #   - "172.16.50.0/24"       # Monitoring subnet

# Simple upstream configuration
upstreams:
  load_balancing:
    strategy: "round_robin"
  
  health_check:
    enabled: true
    path: "/health"
    interval: "30s"
    timeout: "5s"
    failure_threshold: 2
    success_threshold: 1
    expected_status_codes: [200]
  
  targets:
    - name: "test-backend"
      url: "http://localhost:3001"
      weight: 100
      enabled: true

# Tenants map requests to upstreams and can have Lua scripts
tenants:
  - name: "simple"
    base_path: "/api"  # All /api/* requests go to this tenant
    upstreams:
      - name: "test-backend"
        url: "http://localhost:3001"

# Minimal Lua configuration - just one tenant
lua:
  enabled: true
  max_states: 5     # Number of Lua states in the pool - reduced to prevent OOM until bindings cache is active
  max_scripts: 100      # Maximum number of cached compiled scripts
  script_timeout: "500ms" # Maximum execution time for Lua scripts
  middleware_timeout: "1s" # Maximum execution time for Lua middleware
  scripts_dir: "./lua-scripts" # Directory containing Lua scripts (optional)
  
  tenant_scripts:
    "simple":
      enabled: true
      routing_script: "simple_routes.lua"
      middleware_script: "simple_middleware.lua"